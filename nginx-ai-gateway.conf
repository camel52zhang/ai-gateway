# AI Gateway Nginx 反代配置（certbot 申请证书前的版本）
#
# 用法：
#   1. 把本文件放到 /etc/nginx/sites-available/ai-gateway.conf
#   2. 将 __DOMAIN__ 替换成你的真实域名（如 gw.example.com）
#   3. ln -s /etc/nginx/sites-available/ai-gateway.conf /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. sudo certbot --nginx -d 你的域名   # 自动申请证书并把本配置升级为 HTTPS
#
# 说明：本文件只监听 80 端口。运行 certbot --nginx 后，Certbot 会自动
#       追加 443(SSL) server 块并重写 proxy 转发，无需手动改证书路径。

server {
    listen 80;
    server_name __DOMAIN__;

    # 转发所有请求到本地网关（网关本身监听 0.0.0.0:7000，仅本机 nginx 可达）
    location / {
        proxy_pass http://127.0.0.1:7000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE 流式需要长连接，关闭缓冲
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }
}
