name: Docker Publish

# 触发条件：
#   - push 到 main 分支        → 跑测试 + 构建并推送 latest 与 commit SHA 短标签
#   - 打 v*.*.* 语义化 tag     → 额外推送对应版本标签
#   - 提 PR 到 main            → 仅跑测试，不推送镜像
on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------
  # 1) 单元测试：确保合并/发布前代码可编译且测试通过
  # ---------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # 本项目使用纯 Go 版 SQLite，需关闭 CGO 以静态链接
      - name: Run tests
        env:
          CGO_ENABLED: "0"
        run: go test ./...

  # ---------------------------------------------------------------
  # 2) 构建并推送镜像到 Docker Hub（仅在非 PR 时执行）
  # ---------------------------------------------------------------
  build-and-push:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 根据触发条件生成镜像标签：
      #   - main 分支          → latest
      #   - 任意 push          → sha-<短哈希>
      #   - v*.*.* tag         → 语义化版本（如 v1.2.3）
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/ai-gateway
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
